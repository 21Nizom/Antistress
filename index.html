<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eternal Bond</title>
    <style>
        * { 
            box-sizing: border-box; 
            -webkit-touch-callout: none; /* Запрет системных меню */
            -webkit-user-select: none;   /* Запрет выделения текста */
            user-select: none; 
            outline: none;
        }
        
        body {
            margin: 0; height: 100vh; overflow: hidden; touch-action: none;
            background: #000; font-family: 'Verdana', sans-serif;
            display: flex; justify-content: center; align-items: center;
            transition: background 1.2s ease-in-out;
        }

        /* ТЕМАТИЧЕСКИЕ ФОНЫ */
        .mode-0 { background: radial-gradient(circle, #1e3c72 0%, #000 100%); --theme: #00d2ff; }
        .mode-1 { background: radial-gradient(circle, #4a0e0e 0%, #000 100%); --theme: #ffb3b3; }
        .mode-2 { background: radial-gradient(circle, #222 0%, #000 100%); --theme: #ffffff; }
        .mode-3 { background: radial-gradient(circle, #600 0%, #000 100%); --theme: #ff4d4d; }
        .mode-4 { background: radial-gradient(circle, #444a2b 0%, #000 100%); --theme: #f5f5dc; }
        .mode-5 { background: radial-gradient(circle, #2a0845 0%, #000 100%); --theme: #e0c3fc; }
        
        .glitch-active { background: #100 !important; animation: pulse-bg 0.2s infinite alternate; }
        @keyframes pulse-bg { from { opacity: 1; } to { opacity: 0.7; } }

        .ui-container { position: absolute; z-index: 100; pointer-events: none; text-align: center; width: 100%; }
        .ui-text { color: var(--theme); text-transform: uppercase; letter-spacing: 10px; font-size: 14px; opacity: 0.4; transition: 1s; }

        #secret-word {
            position: absolute; color: #fff; font-size: 35px; font-weight: 900; 
            opacity: 0; filter: blur(10px); transition: opacity 0.3s, filter 0.3s;
            pointer-events: none; z-index: 110; text-transform: uppercase; 
            text-shadow: 0 0 20px rgba(255,255,255,0.8);
        }

        canvas { position: absolute; top: 0; left: 0; z-index: 10; pointer-events: none; }
    </style>
</head>
<body class="mode-0" oncontextmenu="return false;">

    <div class="ui-container"><div class="ui-text" id="ui">Traveling</div></div>
    <div id="secret-word">BEST FRIEND</div>
    <canvas id="canvas"></canvas>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const secretWord = document.getElementById('secret-word');
        
        let width, height, particles = [];
        let mouse = { x: -1000, y: -1000, active: false, lastX: 0, lastY: 0, speed: 0 };
        let currentMode = 0;
        let isGlitching = false;
        let secretIndex = 0;
        let hasGlitchedInThisSession = false;

        const modes = [
            { name: 'Traveling', freq: 174 },
            { name: 'Coquette', freq: 432 },
            { name: 'Minimalism', freq: 128 },
            { name: 'Romantic', freq: 285 },
            { name: 'Old Money', freq: 196 },
            { name: 'Calm Aura', freq: 220 }
        ];

        const secrets = ["BEST FRIEND", "TRUST", "LOYALTY", "UNIQUE", "ALWAYS"];

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        function playSound(freq, glitch = false) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = glitch ? 'sawtooth' : 'sine';
                osc.frequency.setValueAtTime(glitch ? 50 : freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + (glitch ? 0.3 : 1));
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + 1);
            } catch(e) {}
        }

        class Particle {
            constructor() {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.init();
            }
            init() {
                this.vx = (Math.random() - 0.5) * 2;
                this.vy = (Math.random() - 0.5) * 2;
                this.size = Math.random() * 2 + 1;
                this.angle = Math.random() * Math.PI * 2;
            }
            update() {
                if (mouse.active) {
                    let dx = mouse.x - this.x;
                    let dy = mouse.y - this.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    let force = isGlitching ? 1.0 : 0.05;
                    
                    if (dist < 300) {
                        this.vx += dx * (isGlitching ? -force : force);
                        this.vy += dy * (isGlitching ? -force : force);
                    }
                } else {
                    let dx = (width/2 + Math.cos(this.angle) * 120) - this.x;
                    let dy = (height/2 + Math.sin(this.angle) * 120) - this.y;
                    this.vx += dx * 0.002;
                    this.vy += dy * 0.002;
                    this.angle += 0.01;
                }
                this.x += this.vx; this.y += this.vy;
                this.vx *= 0.95; this.vy *= 0.95;

                if (this.x < 0 || this.x > width) this.vx *= -1;
                if (this.y < 0 || this.y > height) this.vy *= -1;
            }
            draw() {
                const color = getComputedStyle(document.body).getPropertyValue('--theme');
                ctx.fillStyle = isGlitching ? '#fff' : color;
                ctx.shadowBlur = 15;
                ctx.shadowColor = ctx.fillStyle;
                ctx.beginPath();
                ctx.arc(this.x, this.y, isGlitching ? this.size * 2.5 : this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function init() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 150; i++) particles.push(new Particle());
        }

        window.addEventListener('pointerdown', (e) => {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            mouse.active = true;
            mouse.x = e.clientX; mouse.y = e.clientY;
            mouse.lastX = e.clientX; mouse.lastY = e.clientY;
            hasGlitchedInThisSession = false;

            currentMode = (currentMode + 1) % modes.length;
            document.body.className = 'mode-' + currentMode;
            ui.innerText = modes[currentMode].name;
            playSound(modes[currentMode].freq);
        });

        window.addEventListener('pointerup', () => {
            mouse.active = false;
            isGlitching = false;
            document.body.classList.remove('glitch-active');
            secretWord.style.opacity = 0;
        });

        window.addEventListener('pointermove', (e) => {
            if (!mouse.active) return;
            
            let dx = e.clientX - mouse.lastX;
            let dy = e.clientY - mouse.lastY;
            mouse.speed = Math.sqrt(dx*dx + dy*dy);
            
            mouse.x = e.clientX; mouse.y = e.clientY;
            mouse.lastX = e.clientX; mouse.lastY = e.clientY;

            // Чувствительность глитча (снижена до 60 для уверенного срабатывания)
            if (mouse.speed > 60 && !hasGlitchedInThisSession) {
                isGlitching = true;
                hasGlitchedInThisSession = true;
                document.body.classList.add('glitch-active');
                
                secretWord.innerText = secrets[secretIndex];
                secretIndex = (secretIndex + 1) % secrets.length;
                
                secretWord.style.opacity = 1;
                secretWord.style.filter = "blur(0px)";
                secretWord.style.left = (width/2 - secretWord.offsetWidth/2) + 'px';
                secretWord.style.top = (height/2 - 25) + 'px';

                playSound(40, true);
                if (navigator.vibrate) navigator.vibrate([40, 40]);
            }
        });

        function loop() {
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', init);
        init(); loop();
    </script>
</body>
</html>
